document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ion gerarInstrucoes() { if (window._gerarInstrucoes) window._gerarInstrucoes(); }\nfunction confirmarCadastro() { if (window._confirmarCadastro) window._confirmarCadastro(); }\nfunction mostrarFormNovoFunc(s) { if (window._mostrarFormNovoFunc) window._mostrarFormNovoFunc(s); }\nfunction gerarPreview() { if (window._gerarPreview) window._gerarPreview(); }\nfunction adicionarIP() { if (window._adicionarIP) window._adicionarIP(); }\nfunction removerIP(id) { if (window._removerIP) window._removerIP(id); }\nfunction salvarCadastro() { if (window._salvarCadastro) window._salvarCadastro(); }\nfunction editarCadastro(id) { if (window._editarCadastro) window._editarCadastro(id); }\nfunction gerarFolhaPDF(id) { if (window._gerarFolhaPDF) window._gerarFolhaPDF(id); }\nfunction abrirDetalheCad(id) { if (window._abrirDetalheCad) window._abrirDetalheCad(id); }\nfunction abrirFormCadastro(id) { if (window._abrirFormCadastro) window._abrirFormCadastro(id); }\nfunction toggleEditarCad() { if (window._toggleEditarCad) window._toggleEditarCad(); }\nfunction voltarListaCad() { if (window._voltarListaCad) window._voltarListaCad(); }\nfunction mostrarFormCadastro(id) { if (window._mostrarFormCadastro) window._mostrarFormCadastro(id); }\nfunction voltarListaCadastro() { if (window._voltarListaCadastro) window._voltarListaCadastro(); }\nfunction verPerfilCadastro(id) { if (window._verPerfilCadastro) window._verPerfilCadastro(id); }\nfunction editarCadastroAtual() { if (window._editarCadastroAtual) window._editarCadastroAtual(); }\nfunction gerarFolhaPDFAtual() { if (window._gerarFolhaPDFAtual) window._gerarFolhaPDFAtual(); }\nfunction abrirMgrPunchModal(u,n,d) { if (window._abrirMgrPunchModal) window._abrirMgrPunchModal(u,n,d); }\nfunction selecionarMgrPunch(i) { if (window.selecionarMgrPunch) window.selecionarMgrPunch(i); }\nfunction aplicarAlteracaoMgr() { if (window.aplicarAlteracaoMgr) window.aplicarAlteracaoMgr(); }\nfunction adicionarPontoMgr() { if (window.adicionarPontoMgr) window.adicionarPontoMgr(); }\nfunction fecharMgrPunchModal() { if (window.fecharMgrPunchModal) window.fecharMgrPunchModal(); }\n<\u002Fscript>\n\n<!-- FIREBASE - v20260407195957 -->\n<script type=\"module\">\n// Module-level state variables\nlet modalDia = null;\nlet modalBatidasDia = [];\nlet modalBatidaSelecionada = null;\nlet solicitacoesAdicionais = [];\nlet currentUser = null;\nlet currentUserData = null;\nlet punchProcessing = false;\nlet unsubscribeTodayAll = null;\nlet clockInterval = null;\nlet currentHistMonth = null;\nlet reportData = [];\n\nimport { initializeApp } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js\";\nimport { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js\";\nimport { getFirestore, collection, addDoc, query, where, getDocs, onSnapshot, Timestamp, doc as firestoreDoc, updateDoc } from \"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\";\n\nconst firebaseConfig = {\n  apiKey: \"AIzaSyBOVfslCbt22ok_9brTbBOdNbXe0-QN1Kw\",\n  authDomain: \"ponto-olioli.firebaseapp.com\",\n  projectId: \"ponto-olioli\",\n  storageBucket: \"ponto-olioli.firebasestorage.app\",\n  messagingSenderId: \"78477102291\",\n  appId: \"1:78477102291:web:b5bc712a793ce89f06d826\"\n};\n\nconst app = initializeApp(firebaseConfig);\nconst auth = getAuth(app);\nconst db = getFirestore(app);\n\n// USER MAP: username -> email (Firebase Auth usa email)\nconst USER_MAP = {\n  'gerente':          { email: 'gerente@olioli.app',         role: 'manager', name: 'Gerente' },\n  'erllany.nienke':   { email: 'erllany@olioli.app',         role: 'employee', name: 'Erllany Nienke' },\n  'lucas.luchi':      { email: 'lucas@olioli.app',           role: 'employee', name: 'Lucas Luchi' },\n  'rafael.ferreira':  { email: 'rafael@olioli.app',          role: 'employee', name: 'Rafael Ferreira' },\n};\n\ncurrentUser = null;\ncurrentUserData = null;\nreportData = [];\nclockInterval = null;\ncurrentHistMonth = null;\n\n// ---- HELPERS ----\nfunction showToast(msg, color) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.style.background = color || '#1a1a1a';\n  t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 2800);\n}\n\nfunction showScreen(id) {\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n}\n\nfunction todayStr(d) {\n  d = d ? new Date(d) : new Date();\n  // Dia de trabalho reinicia às 05h — turnos que passam da meia-noite ficam no mesmo dia\n  if (d.getHours() < 5) {\n    d.setDate(d.getDate() - 1);\n  }\n  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;\n}\n\nfunction formatDate(dateStr) {\n  const [y,m,d] = dateStr.split('-');\n  return `${d}/${m}/${y}`;\n}\n\nfunction formatTime(ts) {\n  const d = ts instanceof Date ? ts : ts.toDate();\n  return d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});\n}\n\nfunction initials(name) {\n  return name.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();\n}\n\nfunction updateClock(clockId, dateId) {\n  const now = new Date();\n  document.getElementById(clockId).textContent = now.toLocaleTimeString('pt-BR');\n  if (dateId) {\n    document.getElementById(dateId).textContent = now.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});\n  }\n}\n\n// ---- LOGIN ----\nwindow._doLogin = async function() {\n  const userInput = document.getElementById('login-user').value.trim().toLowerCase();\n  const passInput = document.getElementById('login-pass').value;\n  const errEl = document.getElementById('login-error');\n  errEl.textContent = '';\n\n  const userData = USER_MAP[userInput];\n  if (!userData) { errEl.textContent = 'Usuário não encontrado.'; return; }\n\n  try {\n    await signInWithEmailAndPassword(auth, userData.email, passInput);\n  } catch(e) {\n    errEl.textContent = 'Usuário ou senha incorretos.';\n  }\n};\n\n\n\nwindow._doLogout = async function() {\n  await signOut(auth);\n};\n\n\nasync function loadUserMapFromFirestore() {\n  try {\n    const snap = await getDocs(collection(db, 'funcionarios'));\n    snap.forEach(d => {\n      const f = d.data();\n      if (f.ativo && f.usuario && f.email) {\n        USER_MAP[f.usuario.toLowerCase()] = { email: f.email, role: 'employee', name: f.nome };\n      }\n    });\n  } catch(e) { console.error('loadUserMap error:', e); }\n}\n\n// ---- AUTH STATE ----\nonAuthStateChanged(auth, async (user) => {\n  if (clockInterval) clearInterval(clockInterval);\n\n  if (!user) {\n    currentUser = null;\n    currentUserData = null;\n    // Check IP before showing login\n    const ipOk = await verificarIP();\n    if (ipOk) {\n      showScreen('screen-login');\n      document.getElementById('login-error').textContent = '';\n    }\n    return;\n  }\n\n  currentUser = user;\n  const userData = Object.values(USER_MAP).find(u => u.email === user.email);\n  currentUserData = userData;\n\n  if (userData.role === 'manager') {\n    showScreen('screen-manager');\n    loadTodayAll();\n    setDefaultDates();\n    loadUserMapFromFirestore();\n  } else {\n    document.getElementById('emp-header-name').textContent = userData.name;\n    showScreen('screen-employee');\n    clockInterval = setInterval(() => updateClock('emp-clock','emp-date'), 1000);\n    updateClock('emp-clock','emp-date');\n    await loadTodayStatus();\n    buildMonthTabs();\n  }\n});\n\n// ---- EMPLOYEE: PUNCH ----\n\nfunction secsToStr(totalSec) {\n  if (totalSec <= 0) return null;\n  const h = Math.floor(totalSec / 3600);\n  const m = Math.floor((totalSec % 3600) / 60);\n  const s = totalSec % 60;\n  if (h === 0 && m === 0) return `${String(s).padStart(2,'0')}seg`;\n  return `${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}min`;\n}\n\n// Returns { total, normal, noturno } in seconds\n// Noturno: 22:00 - 05:00 (adicional noturno)\nfunction calcDetalhado(records) {\n  const NOTURNO_START = 22 * 3600; // 22:00 em segundos\n  const NOTURNO_END = 5 * 3600;    // 05:00 em segundos\n  let normalSec = 0;\n  let noturnoSec = 0;\n  let lastEntry = null;\n\n  for (const r of records) {\n    if (r.tipo === 'entry') {\n      lastEntry = r.hora;\n    } else if (r.tipo === 'exit' && lastEntry !== null) {\n      const ep = lastEntry.split(':').map(Number);\n      const sp = r.hora.split(':').map(Number);\n      let entSec = ep[0]*3600 + ep[1]*60 + (ep[2]||0);\n      let saiSec = sp[0]*3600 + sp[1]*60 + (sp[2]||0);\n      if (saiSec < entSec) saiSec += 24*3600;\n\n      // Walk through each second of the interval and classify\n      // More efficient: calculate intersection with noturno periods\n      // Noturno periods in a 24h+5h window: [22*3600, 29*3600] (22h to next 05h)\n      const periodos = [\n        { ini: NOTURNO_START, fim: 24*3600 + NOTURNO_END } // 22:00 to 05:00 next day\n      ];\n\n      let segNoturno = 0;\n      for (const p of periodos) {\n        const overlap_ini = Math.max(entSec, p.ini);\n        const overlap_fim = Math.min(saiSec, p.fim);\n        if (overlap_fim > overlap_ini) segNoturno += overlap_fim - overlap_ini;\n      }\n\n      // Also check if shift started before midnight in noturno zone\n      // e.g. shift 21:00 to 02:00: noturno = 22:00 to 02:00 = 4h\n      if (entSec < NOTURNO_START) {\n        // might have noturno portion: from 22:00 to saida (if saida > 22:00)\n        const overlap_ini2 = Math.max(entSec, NOTURNO_START);\n        const overlap_fim2 = Math.min(saiSec, 24*3600 + NOTURNO_END);\n        if (overlap_fim2 > overlap_ini2 && overlap_ini2 >= NOTURNO_START) {\n          segNoturno = overlap_fim2 - NOTURNO_START;\n        }\n      }\n\n      const segTotal = saiSec - entSec;\n      noturnoSec += segNoturno;\n      normalSec += segTotal - segNoturno;\n      lastEntry = null;\n    }\n  }\n\n  return {\n    total: normalSec + noturnoSec,\n    normal: normalSec,\n    noturno: noturnoSec\n  };\n}\n\nfunction calcHorasTrabalhadas(records) {\n  const d = calcDetalhado(records);\n  return secsToStr(d.total);\n}\n\nfunction groupByDay(records) {\n  const days = {};\n  records.forEach(r => {\n    if (!days[r.data]) days[r.data] = [];\n    days[r.data].push(r);\n  });\n  return days;\n}\n\nfunction setPunchButton(state) {\n  const btnEntry = document.getElementById('btn-entry');\n  const btnExit = document.getElementById('btn-exit');\n  if (!btnEntry || !btnExit) return;\n  if (state === 'entry') {\n    btnEntry.style.display = 'block';\n    btnExit.style.display = 'none';\n    btnEntry.onclick = () => punch('entry');\n  } else if (state === 'exit') {\n    btnEntry.style.display = 'none';\n    btnExit.style.display = 'block';\n    btnExit.onclick = () => punch('exit');\n  } else {\n    btnEntry.style.display = 'none';\n    btnExit.style.display = 'none';\n  }\n}\n\n\nasync function loadMonthHoursForStatus(username) {\n  const now = new Date();\n  const year = now.getFullYear();\n  const month = now.getMonth() + 1;\n  const firstDay = `${year}-${String(month).padStart(2,'0')}-01`;\n  const lastDayNum = new Date(year, month, 0).getDate();\n  const lastDay = `${year}-${String(month).padStart(2,'0')}-${String(lastDayNum).padStart(2,'0')}`;\n\n  try {\n    const q = query(\n      collection(db, 'registros'),\n      where('usuario', '==', username),\n      where('data', '>=', firstDay),\n      where('data', '<=', lastDay)\n    );\n    const snap = await getDocs(q);\n    const records = [];\n    snap.forEach(doc => records.push(doc.data()));\n    records.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n\n    const dayGroups = groupByDay(records);\n    let totalMin = 0;\n    Object.values(dayGroups).forEach(dayRecs => {\n      const h = calcHorasTrabalhadas(dayRecs);\n      if (h) {\n        const hh = parseInt(h.split('h')[0]);\n        const mm = parseInt(h.split('h')[1].replace('min',''));\n        totalMin += hh*60 + mm;\n      }\n    });\n\n    const horasMesEl = document.getElementById('status-horas-mes');\n    const valMesEl = document.getElementById('val-horas-mes');\n    if (horasMesEl && valMesEl) {\n      const h = Math.floor(totalMin/60);\n      const m = totalMin % 60;\n      valMesEl.textContent = totalMin > 0 ? `${String(h).padStart(2,'0')}h${String(m).padStart(2,'0')}min` : '—';\n      horasMesEl.style.display = 'block';\n    }\n  } catch(e) {\n    console.error('Erro horas mês:', e);\n  }\n}\n\nasync function loadTodayStatus() {\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  const today = todayStr();\n  const q = query(\n    collection(db, 'registros'),\n    where('usuario', '==', username),\n    where('data', '==', today)\n  );\n  const snap = await getDocs(q);\n  const records = [];\n  snap.forEach(doc => records.push(doc.data()));\n  records.sort((a, b) => a.timestamp.seconds - b.timestamp.seconds);\n\n  const tbody = document.getElementById('today-records-body');\n\n  if (!records.length) {\n    tbody.innerHTML = `<tr><td colspan=\"2\" class=\"empty-row\">Nenhum registro hoje<\u002Ftd><\u002Ftr>`;\n    document.getElementById('emp-status-badge').innerHTML = `<span class=\"status-badge status-none\">Sem registro<\u002Fspan>`;\n    setPunchButton('entry');\n    return;\n  }\n\n  const totalHoras = calcHorasTrabalhadas(records);\n  tbody.innerHTML = records.map(r =>\n    `<tr><td class=\"${r.tipo==='entry'?'badge-type-in':'badge-type-out'}\">${r.tipo==='entry'?'Entrada':'Saída'}<\u002Ftd><td>${r.hora}<\u002Ftd><\u002Ftr>`\n  ).join('');\n\n  const totalEl = document.getElementById('today-total-horas');\n  if (totalEl) {\n    totalEl.style.display = totalHoras ? 'block' : 'none';\n    if (totalHoras) totalEl.innerHTML = `<span style=\"font-size:13px;color:#888;\">Total trabalhado hoje:<\u002Fspan> <span style=\"font-size:16px;font-weight:600;color:#2a1f1a;\">${totalHoras}<\u002Fspan>`;\n  }\n\n  // Update status card hours\n  const horasDiaEl = document.getElementById('status-horas-dia');\n  const valDiaEl = document.getElementById('val-horas-dia');\n  if (horasDiaEl && valDiaEl) {\n    valDiaEl.textContent = totalHoras || '—';\n    horasDiaEl.style.display = records.length >= 2 ? 'block' : 'none';\n  }\n\n  // Load month hours\n  loadMonthHoursForStatus(username);\n\n  const last = records[records.length-1];\n  if (last.tipo === 'entry') {\n    document.getElementById('emp-status-badge').innerHTML = `<span class=\"status-badge status-in\">✓ Dentro<\u002Fspan>`;\n    setPunchButton('exit');\n  } else {\n    document.getElementById('emp-status-badge').innerHTML = `<span class=\"status-badge status-out\">✗ Saída registrada<\u002Fspan>`;\n    setPunchButton('entry');\n  }\n}\n\nwindow._punch = async function punch(tipo) {\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  const now = new Date();\n  const hora = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});\n\n  const btnEntry = document.getElementById('btn-entry');\n  const btnExit = document.getElementById('btn-exit');\n  btnEntry.disabled = true;\n  btnExit.disabled = true;\n  btnEntry.style.opacity = '0.35';\n  btnExit.style.opacity = '0.35';\n\n  try {\n    // Verificação no servidor antes de salvar\n    const q = query(\n      collection(db, 'registros'),\n      where('usuario', '==', username),\n      where('data', '==', todayStr())\n    );\n    const snap = await getDocs(q);\n    const records = [];\n    snap.forEach(doc => records.push(doc.data()));\n    records.sort((a, b) => a.timestamp.seconds - b.timestamp.seconds);\n\n    const last = records.length ? records[records.length-1] : null;\n    const ultimoTipo = last ? last.tipo : null;\n\n    // Bloqueia registro duplicado\n    if (tipo === 'entry' && ultimoTipo === 'entry') {\n      showToast('Você já registrou entrada!', '#c0392b');\n      await loadTodayStatus();\n      punchProcessing = false;\n      return;\n    }\n    if (tipo === 'exit' && ultimoTipo !== 'entry') {\n      showToast('Registre a entrada primeiro!', '#c0392b');\n      await loadTodayStatus();\n      punchProcessing = false;\n      return;\n    }\n\n    await addDoc(collection(db, 'registros'), {\n      usuario: username,\n      nome: currentUserData.name,\n      data: todayStr(),\n      hora: hora,\n      tipo: tipo,\n      timestamp: Timestamp.fromDate(now)\n    });\n    const label = tipo === 'entry' ? 'Entrada' : 'Saída';\n    showToast(`${label} registrada às ${hora}`, tipo === 'entry' ? '#2a1f1a' : '#c0392b');\n    await loadTodayStatus();\n  } catch(e) {\n    showToast('Erro ao registrar. Tente novamente.', '#c0392b');\n    await loadTodayStatus();\n  } finally {\n    punchProcessing = false;\n  }\n};\n\n// ---- EMPLOYEE: HISTÓRICO ----\nfunction buildMonthTabs() {\n  const tabs = document.getElementById('month-tabs');\n  const now = new Date();\n  tabs.innerHTML = '';\n  for (let i = 0; i < 4; i++) {\n    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);\n    const label = d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});\n    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;\n    const btn = document.createElement('button');\n    btn.className = 'month-tab' + (i===0?' active':'');\n    btn.textContent = label.charAt(0).toUpperCase() + label.slice(1);\n    btn.onclick = () => {\n      document.querySelectorAll('.month-tab').forEach(b=>b.classList.remove('active'));\n      btn.classList.add('active');\n      loadHistorico(val);\n    };\n    tabs.appendChild(btn);\n    if (i===0) { currentHistMonth = val; loadHistorico(val); }\n  }\n}\n\nasync function loadHistorico(monthStr) {\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  const [year, month] = monthStr.split('-').map(Number);\n\n  // Build date strings for the month like \"2025-04-01\" to \"2025-04-30\"\n  const firstDay = `${year}-${String(month).padStart(2,'0')}-01`;\n  const lastDayNum = new Date(year, month, 0).getDate();\n  const lastDay = `${year}-${String(month).padStart(2,'0')}-${String(lastDayNum).padStart(2,'0')}`;\n\n  document.getElementById('hist-records-body').innerHTML = `<tr><td colspan=\"3\" class=\"empty-row\">Carregando...<\u002Ftd><\u002Ftr>`;\n  document.getElementById('month-summary').innerHTML = '';\n\n  const q = query(\n    collection(db, 'registros'),\n    where('usuario', '==', username),\n    where('data', '>=', firstDay),\n    where('data', '<=', lastDay)\n  );\n\n  let snap;\n  try {\n    snap = await getDocs(q);\n  } catch(e) {\n    console.error('Erro historico:', e);\n    document.getElementById('hist-records-body').innerHTML = `<tr><td colspan=\"3\" class=\"empty-row\">Erro: ${e.code || e.message}<\u002Ftd><\u002Ftr>`;\n    return;\n  }\n  const records = [];\n  snap.forEach(doc => {\n    const d = doc.data();\n    records.push(d);\n  });\n  records.sort((a, b) => {\n    if (a.data < b.data) return -1;\n    if (a.data > b.data) return 1;\n    return a.timestamp.seconds - b.timestamp.seconds;\n  });\n\n  const dayGroups = groupByDay(records);\n  const numDays = Object.keys(dayGroups).length;\n\n  // Calculate total hours for the month\n  let totalMinMonth = 0;\n  Object.values(dayGroups).forEach(dayRecs => {\n    const h = calcHorasTrabalhadas(dayRecs);\n    if (h) {\n      const parts = h.match(/(\\d+)h(\\d+)min/);\n      if (parts) totalMinMonth += parseInt(parts[1])*60 + parseInt(parts[2]);\n    }\n  });\n  const totalHMonth = Math.floor(totalMinMonth/60);\n  const totalMMonth = totalMinMonth % 60;\n  const totalHorasMonth = totalMinMonth > 0 ? `${String(totalHMonth).padStart(2,'0')}h${String(totalMMonth).padStart(2,'0')}min` : '—';\n\n  document.getElementById('month-summary').innerHTML = `\n    <div class=\"summary-item\"><div class=\"summary-label\">Dias trabalhados<\u002Fdiv><div class=\"summary-value\">${numDays}<\u002Fdiv><\u002Fdiv>\n    <div class=\"summary-item\"><div class=\"summary-label\">Total do mês<\u002Fdiv><div class=\"summary-value\" style=\"font-size:16px;\">${totalHorasMonth}<\u002Fdiv><\u002Fdiv>\n  `;\n\n  const tbody = document.getElementById('hist-records-body');\n  if (!records.length) {\n    tbody.innerHTML = `<tr><td colspan=\"4\" class=\"empty-row\">Sem registros neste mês<\u002Ftd><\u002Ftr>`;\n    return;\n  }\n\n  // One row per day\n  const sortedDays = Object.keys(dayGroups).sort().reverse();\n  tbody.innerHTML = '';\n\n  // Load all corrections for this user this month\n  let solicitacoesMap = {};\n  try {\n    const qSol = query(collection(db, 'solicitacoes'), where('usuario', '==', username), where('data', '>=', firstDay), where('data', '<=', lastDay));\n    const snapSol = await getDocs(qSol);\n    snapSol.forEach(doc => {\n      const d = doc.data();\n      solicitacoesMap[d.data] = { status: d.status, motivo: d.motivo };\n    });\n  } catch(e) {}\n\n  for (const data of sortedDays) {\n    const dayRecs = dayGroups[data] || [];\n    const entries = dayRecs.filter(r => r.tipo === 'entry').map(r => r.hora);\n    const exits = dayRecs.filter(r => r.tipo === 'exit').map(r => r.hora);\n    const det = calcDetalhado(dayRecs);\n    const total = secsToStr(det.total) || '—';\n    const normalH = secsToStr(det.normal);\n    const noturnoH = secsToStr(det.noturno);\n    const impar = dayRecs.length % 2 !== 0;\n    const isToday = data === todayStr();\n    const sol = solicitacoesMap[data];\n\n    // Build status indicators\n    let statusHtml = '';\n    if (impar && !isToday) statusHtml += `<span class=\"aviso-impar\">⚠ Batida ímpar — verifique<\u002Fspan>`;\n    if (sol && sol.status === 'pendente') statusHtml += `<span class=\"correcao-pendente\">⏳ Correção aguardando aprovação<\u002Fspan>`;\n    if (sol && sol.status === 'aceita') statusHtml += `<span class=\"correcao-aceita\">✓ Ponto corrigido<\u002Fspan>`;\n    if (sol && sol.status === 'recusada') statusHtml += `<span style=\"font-size:11px;color:#c0392b;font-weight:600;margin-top:6px;display:block;\">✗ Correção recusada<\u002Fspan>`;\n\n    // Show correction button only for past days, not if already accepted\n    const podeCorrigir = !isToday && (!sol || sol.status === 'recusada');\n    if (podeCorrigir) statusHtml += `<button class=\"btn-correcao\" onclick=\"abrirModal('${data}')\">✎ Solicitar correção<\u002Fbutton>`;\n\n    const diaSem = new Date(data + 'T12:00:00').getDay();\n    const diasNomes = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];\n    const diaNome = diasNomes[diaSem];\n    const isDomingo = diaSem === 0;\n    const isSegunda = diaSem === 1;\n    const diaFolga = isDomingo || isSegunda;\n    const semPonto = dayRecs.length === 0;\n    const deveriaTerPonto = !diaFolga && !isToday;\n\n    // Add aviso for days without punches that should have them\n    if (deveriaTerPonto && semPonto) {\n      statusHtml += `<span class=\"aviso-impar\">⚠ Sem registro<\u002Fspan>`;\n      const podeCorrigirVazio = !sol || sol.status === 'recusada';\n      if (podeCorrigirVazio) {\n        statusHtml += `<button class=\"btn-correcao\" onclick=\"abrirModal('${data}')\">+ Adicionar ponto<\u002Fbutton>`;\n      }\n    }\n\n    const tr = document.createElement('tr');\n    if (impar && !isToday) tr.classList.add('dia-impar');\n    if (deveriaTerPonto && semPonto) tr.style.background = '#fce4ec';\n    if (diaFolga) tr.style.background = '#f5f5f5';\n\n    const dataCell = `<div style=\"font-size:13px;font-weight:500;\">${formatDate(data)}<\u002Fdiv>\n      <div style=\"font-size:11px;color:#888;\">${diaNome}${diaFolga ? ' — folga' : ''}<\u002Fdiv>\n      ${statusHtml ? '<div style=\"margin-top:4px;\">' + statusHtml + '<\u002Fdiv>' : ''}`;\n\n    if (diaFolga) {\n      tr.innerHTML = `\n        <td style=\"padding:8px 6px;\">${dataCell}<\u002Ftd>\n        <td colspan=\"3\" style=\"text-align:center;color:#bbb;font-size:12px;font-style:italic;\">— Folga —<\u002Ftd>\n      `;\n    } else {\n      tr.innerHTML = `\n        <td style=\"padding:8px 6px;\">${dataCell}<\u002Ftd>\n        <td class=\"badge-type-in\">${entries.join('<br>') || '<span style=\"color:#bbb;\">—<\u002Fspan>'}<\u002Ftd>\n        <td class=\"badge-type-out\">${exits.join('<br>') || '<span style=\"color:#bbb;\">—<\u002Fspan>'}<\u002Ftd>\n        <td style=\"font-weight:500;font-size:12px;line-height:1.8;\">\n          ${normalH ? `<div style=\"color:#444;\">Diurno: ${normalH}<\u002Fdiv>` : ''}\n          ${noturnoH ? `<div style=\"color:#e65100;\">Noturno: ${noturnoH}<\u002Fdiv>` : ''}\n          ${!semPonto ? `<div>${total}<\u002Fdiv>` : ''}\n        <\u002Ftd>\n      `;\n    }\n    tbody.appendChild(tr);\n  }\n}\n\n// ---- EMPLOYEE: TABS ----\nwindow._switchEmpTab = function(tab) {\n  ['ponto','historico','perfil'].forEach(t => {\n    document.getElementById(`emp-tab-${t}`).style.display = t===tab?'block':'none';\n    document.getElementById(`nav-${t}`).classList.toggle('active', t===tab);\n  });\n  if (tab==='historico') buildMonthTabs();\n  if (tab==='perfil') loadPerfil();\n};\n\nfunction loadPerfil() {\n  if (!currentUserData) return;\n  document.getElementById('perfil-nome').textContent = currentUserData.name;\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  document.getElementById('perfil-usuario').textContent = username;\n  document.getElementById('pass-atual').value = '';\n  document.getElementById('pass-nova').value = '';\n  document.getElementById('pass-confirma').value = '';\n  document.getElementById('pass-error').textContent = '';\n}\n\nwindow._changePassword = async function() {\n  const atual = document.getElementById('pass-atual').value;\n  const nova = document.getElementById('pass-nova').value;\n  const confirma = document.getElementById('pass-confirma').value;\n  const errEl = document.getElementById('pass-error');\n  errEl.textContent = '';\n\n  if (!atual || !nova || !confirma) { errEl.textContent = 'Preencha todos os campos.'; return; }\n  if (nova.length < 6) { errEl.textContent = 'A nova senha precisa ter pelo menos 6 caracteres.'; return; }\n  if (nova !== confirma) { errEl.textContent = 'As senhas não coincidem.'; return; }\n\n  try {\n    const { reauthenticateWithCredential, EmailAuthProvider, updatePassword } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js\");\n    const credential = EmailAuthProvider.credential(currentUser.email, atual);\n    await reauthenticateWithCredential(currentUser, credential);\n    await updatePassword(currentUser, nova);\n    showToast('Senha alterada com sucesso!', '#2a1f1a');\n    document.getElementById('pass-atual').value = '';\n    document.getElementById('pass-nova').value = '';\n    document.getElementById('pass-confirma').value = '';\n  } catch(e) {\n    if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {\n      errEl.textContent = 'Senha atual incorreta.';\n    } else {\n      errEl.textContent = 'Erro ao alterar senha. Tente novamente.';\n    }\n  }\n};\n\nwindow._toggleField = function(inputId, btnId) {\n  const inp = document.getElementById(inputId);\n  const btn = document.getElementById(btnId);\n  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }\n  else { inp.type = 'password'; btn.textContent = '👁'; }\n};\n\n// ---- MANAGER: TODAY ----\nunsubscribeTodayAll = null;\n\nfunction loadTodayAll() {\n  const today = todayStr();\n  const container = document.getElementById('mgr-today-list');\n  container.innerHTML = `<div class=\"loading\">Carregando...<\u002Fdiv>`;\n\n  if (unsubscribeTodayAll) unsubscribeTodayAll();\n\n  const q = query(\n    collection(db, 'registros'),\n    where('data', '==', today)\n  );\n\n  unsubscribeTodayAll = onSnapshot(q, (snap) => {\n    const byUser = {};\n    snap.forEach(doc => {\n      const d = doc.data();\n      if (!byUser[d.usuario]) byUser[d.usuario] = { nome: d.nome, records: [] };\n      byUser[d.usuario].records.push(d);\n    });\n    Object.values(byUser).forEach(u => u.records.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds));\n\n    const employees = ['erllany.nienke', 'lucas.luchi', 'rafael.ferreira'];\n    const names = { 'erllany.nienke': 'Erllany Nienke', 'lucas.luchi': 'Lucas Luchi', 'rafael.ferreira': 'Rafael Ferreira' };\n\n    container.innerHTML = employees.map(emp => {\n      const data = byUser[emp];\n      const nome = names[emp];\n      const records = data ? data.records : [];\n      const last = records.length ? records[records.length-1] : null;\n      const statusHtml = !last\n        ? `<span class=\"status-badge status-none\">Sem registro<\u002Fspan>`\n        : last.tipo === 'entry'\n          ? `<span class=\"status-badge status-in\">✓ Dentro<\u002Fspan>`\n          : `<span class=\"status-badge status-out\">✗ Saiu<\u002Fspan>`;\n\n      const detHoje = calcDetalhado(records);\n      const totalHoje = secsToStr(detHoje.total);\n      const normalHoje = secsToStr(detHoje.normal);\n      const noturnoHoje = secsToStr(detHoje.noturno);\n      const rows = records.map(r =>\n        `<tr><td class=\"${r.tipo==='entry'?'badge-type-in':'badge-type-out'}\">${r.tipo==='entry'?'Entrada':'Saída'}<\u002Ftd><td>${r.hora}<\u002Ftd><\u002Ftr>`\n      ).join('') || `<tr><td colspan=\"2\" class=\"empty-row\">Nenhum registro<\u002Ftd><\u002Ftr>`;\n\n      return `<div class=\"emp-card\">\n        <div class=\"emp-card-header\">\n          <div class=\"avatar\">${initials(nome)}<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <div class=\"emp-card-name\">${nome}<\u002Fdiv>\n            <div class=\"emp-card-status\">${statusHtml}<\u002Fdiv>\n          <\u002Fdiv>\n          ${totalHoje ? `<div style=\"font-size:12px;text-align:right;line-height:1.8;\">\n            ${normalHoje ? `<div style=\"color:#444;\">Diurno: <strong>${normalHoje}<\u002Fstrong><\u002Fdiv>` : ''}\n            ${noturnoHoje ? `<div style=\"color:# f (!byEmp[r.usuario].days[r.data]) byEmp[r.usuario].days[r.data] = [];\n    byEmp[r.usuario].days[r.data].push(r);\n  });\n\n  let html = '';\n\n  for (const [usuario, empData] of Object.entries(byEmp)) {\n    const sortedDays = Object.keys(empData.days).sort();\n    let empTotalSec = 0, empNormalSec = 0, empNoturnoSec = 0;\n\n    const rows = sortedDays.map(data => {\n      const recs = empData.days[data].sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n      const marcacoes = recs.length ? recs.map(r => r.hora.slice(0,5)).join('  ') : '—';\n      const det = calcDetalhado(recs);\n      empTotalSec += det.total;\n      empNormalSec += det.normal;\n      empNoturnoSec += det.noturno;\n\n      const totalStr = secsToStr(det.total) || '—';\n      const normalStr = secsToStr(det.normal);\n      const noturnoStr = secsToStr(det.noturno);\n      const impar = recs.length % 2 !== 0;\n\n      const [y, m, d] = data.split('-');\n      const diasSemana = ['dom','seg','ter','qua','qui','sex','sáb'];\n      const diaSem = diasSemana[new Date(data + 'T12:00:00').getDay()];\n\n      return `<tr style=\"${impar ? 'background:#fff8e1;' : ''}\">\n        <td style=\"padding:8px 10px;border-bottom:1px solid #f0f0f0;white-space:nowrap;\">\n          <strong style=\"font-size:14px;\">${d}/${m}<\u002Fstrong>\n          <span style=\"font-size:11px;color:#888;display:block;\">${diaSem}<\u002Fspan>\n        <\u002Ftd>\n        <td style=\"padding:8px 10px;border-bottom:1px solid #f0f0f0;font-family:monospace;font-size:13px;color:#2a1f1a;letter-spacing:1px;\">\n          ${impar ? `<span style=\"color:#e65100;\">⚠ <\u002Fspan>` : ''}${marcacoes}\n          <button onclick=\"abrirMgrPunchModal('${usuario}','${empData.nome}','${data}')\" style=\"margin-left:8px;background:none;border:1px solid #F07820;color:#F07820;border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer;\">✎<\u002Fbutton>\n        <\u002Ftd>\n        <td style=\"padding:8px 10px;border-bottom:1px solid #f0 irma = document.getElementById('mgr-confirma-senha').value;\n  const errEl = document.getElementById('mgr-pass-error');\n  errEl.textContent = '';\n  errEl.style.color = '#c0392b';\n\n  if (!empEmail) { errEl.textContent = 'Selecione um funcionário.'; return; }\n  if (!nova || !confirma) { errEl.textContent = 'Preencha todos os campos.'; return; }\n  if (nova.length < 6) { errEl.textContent = 'A senha precisa ter pelo menos 6 caracteres.'; return; }\n  if (nova !== confirma) { errEl.textContent = 'As senhas não coincidem.'; return; }\n\n  // Show instructions since Firebase doesn't allow changing other users passwords from browser\n  const empName = document.getElementById('mgr-emp-select').options[document.getElementById('mgr-emp-select').selectedIndex].text;\n  errEl.style.color = '#2a1f1a';\n  errEl.innerHTML = `\n    <div style=\"background:#fff8e1;border-radius:10px;padding:12px;margin-top:10px;text-align:left;font-size:13px;line-height:1.8;\">\n      <strong>Para redefinir a senha de ${empName}:<\u002Fstrong><br>\n      1. Acesse o <a href=\"https://console.firebase.google.com/project/ponto-olioli/authentication/users\" target=\"_blank\" style=\"color:#F07820;font-weight:600;\">Firebase Authentication ↗<\u002Fa><br>\n      2. Localize o e-mail <strong>${empEmail}<\u002Fstrong><br>\n      3. Clique nos 3 pontos → <strong>Redefinir senha<\u002Fstrong><br>\n      4. Digite: <strong>${nova}<\u002Fstrong>\n    <\u002Fdiv>`;\n};\n\n\n// ---- GERENCIAR FUNCIONÁRIOS ----\nconst EMPLOYEE_LIST = [\n  { nome: 'Erllany Nienke', usuario: 'Erllany.Nienke', email: 'erllany@olioli.app' },\n  { nome: 'Lucas Luchi', usuario: 'Lucas.Luchi', email: 'lucas@olioli.app' },\n  { nome: 'Rafael Ferreira', usuario: 'Rafael.Ferreira', email: 'rafael@olioli.app' },\n];\n\nfunction nomeParaUsuario(nome) {\n  const partes = nome.trim().split(/\\s+/);\n  if (partes.length < 2) return '';\n  const primeiro = partes[0];\n  const ultimo = partes[partes.length - 1];\n  const normalizar = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-zA-Z]/g, '');\n  return `${normalizar(primeiro)}.${normalizar(ultimo)}`;\n}\n\nfunction nomeParaEmail(nome) {\n  const usuario = nomeParaUsuario(nome).toLowerCase();\n  return usuario ? `${usuario}@olioli.app` : '';\n}\n\n\nwindow._mostrarFormNovoFunc = function(show) {\n  if (show === undefined) show = true;\n  document.getElementById('form-novo-func').style.display = show ? 'block' : 'none';\n  if (show) {\n    document.getElementById('novo-nome').value = '';\n    document.getElementById('novo-senha').value = '';\n    document.getElementById('func-instrucoes').style.display = 'none';\n  }\n};\n\nwindow._gerarInstrucoes = function() {\n  const nome = document.getElementById('novo-nome').value.trim();\n  const senha = document.getElementById('novo-senha').value;\n  const partes = nome.split(' ').filter(p => p.length > 0);\n  if (partes.length < 2) { showToast('Digite o nome completo (mínimo 2 nomes).', '#c0392b'); return; }\n  if (!senha || senha.length < 6) { showToast('A senha precisa ter pelo menos 6 caracteres.', '#c0392b'); return; }\n  document.getElementById('preview-email').textContent = nomeParaEmail(nome);\n  document.getElementById('preview-senha').textContent = senha;\n  document.getElementById('preview-usuario').textContent = nomeParaUsuario(nome);\n  document.getElementById('func-instrucoes').style.display = 'block';\n};\n\nwindow._confirmarCadastro = async function() {\n  const nome = document.getElementById('novo-nome').value.trim();\n  const usuario = nomeParaUsuario(nome);\n  const email = nomeParaEmail(nome);\n  if (!usuario) { showToast('Preencha o nome completo.', '#c0392b'); return; }\n  try {\n    await addDoc(collection(db, 'funcionarios'), {\n      nome, usuario, email, ativo: true,\n      criadoEm: Timestamp.fromDate(new Date())\n    });\n    showToast('Funcionário cadastrado com sucesso!', '#2a1f1a');\n    document.getElementById('form-novo-func').style.display = 'none';\n    document.getElementById('func-instrucoes').style.display = 'none';\n    await renderListaFuncionarios();\n  } catch(e) {\n    showToast('Erro ao cadastrar. Tente novamente.', '#c0392b');\n  }\n};\n\nasync function initFuncionarios() {\n  document.getElementById('form-novo-func').style.display = 'none';\n  if (document.getElementById('mgr-emp-select')) {\n    document.getElementById('mgr-emp-select').value = '';\n    document.getElementById('mgr-nova-senha').value = '';\n    document.getElementById('mgr-confirma-senha').value = '';\n    document.getElementById('mgr-pass-error').textContent = '';\n  }\n  await renderListaFuncionarios();\n  await renderListaIPs();\n}\n\nwindow._gerarPreview = function() {\n  const nome = document.getElementById('novo-nome').value;\n  const usuario = nomeParaUsuario(nome);\n  document.getElementById('preview-usuario').textContent = usuario || '—';\n  document.getElementById('preview-email').textContent = nomeParaEmail(nome) || '—';\n};\n\nwindow._gerarInstrucoes = function() {\n  const nome = document.getElementById('novo-nome').value.trim();\n  const senha = document.getElementById('novo-senha').value;\n  if (!nome || nome.trim().split(/\\s+/).length < 2) {\n    showToast('Digite o nome completo (mínimo 2 nomes).', '#c0392b'); return;\n  }\n  if (!senha || senha.length < 6) {\n    showToast('A senha precisa ter pelo menos 6 caracteres.', '#c0392b'); return;\n  }\n  document.getElementById('preview-email').textContent = nomeParaEmail(nome);\n  document.getElementById('preview-senha').textContent = senha;\n  document.getElementById('preview-usuario').textContent = nomeParaUsuario(nome);\n  document.getElementById('func-instrucoes').style.display = 'block';\n  renderListaFuncionarios();\n};\n\nwindow._abrirModal = async function(data) {\n  modalDia = data;\n  modalBatidaSelecionada = null;\n  solicitacoesAdicionais = [];\n  document.getElementById('modal-dia-info').textContent = `Dia: ${formatDate(data)}`;\n  document.getElementById('modal-motivo').value = '';\n  document.getElementById('modal-alterar-section').style.display = 'none';\n  document.getElementById('novo-tipo').value = '';\n  document.getElementById('novo-horario').value = '';\n  const pendEl = document.getElementById('pendentes-adicoes');\n  if (pendEl) pendEl.remove();\n  document.getElementById('correcao-modal').style.display = 'flex';\n\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  const batidasEl = document.getElementById('modal-batidas');\n  batidasEl.innerHTML = '<span style=\"color:#bbb;font-size:13px;\">Carregando...<\u002Fspan>';\n\n  try {\n    const q = query(collection(db, 'registros'), where('usuario', '==', username), where('data', '==', data));\n    const snap = await getDocs(q);\n    modalBatidasDia = [];\n    snap.forEach(d => modalBatidasDia.push(d.data()));\n    modalBatidasDia.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n    renderModalBatidas();\n  } catch(e) { batidasEl.innerHTML = 'Erro ao carregar.'; }\n};\n\nfunction renderModalBatidas() {\n  const batidasEl = document.getElementById('modal-batidas');\n  if (!modalBatidasDia.length) {\n    batidasEl.innerHTML = '<span style=\"color:#bbb;font-size:13px;\">Nenhuma batida registrada<\u002Fspan>';\n    return;\n  }\n  batidasEl.innerHTML = modalBatidasDia.map((r, i) => `\n    <div onclick=\"selecionarBatida(${i})\" id=\"batida-row-${i}\"\n      style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #eee;cursor:pointer;border-radius:6px;transition:background 0.15s;\">\n      <span class=\"${r.tipo==='entry'?'badge-type-in':'badge-type-out'}\" style=\"font-weight:600;\">${r.tipo==='entry'?'▶ Entrada':'■ Saída'}<\u002Fspan>\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <span style=\"color:#444;\">${r.hora}<\u002Fspan>\n        <span style=\"font-size:11px;color:#F07820;\">✎<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\nwindow._selecionarBatida = function(idx) {\n  modalBatidaSelecionada = idx;\n  const r = modalBatidasDia[idx];\n  // Highlight selected\n  document.querySelectorAll('[id^=\"batida-row-\"]').forEach(el => el.style.background = '');\n  document.getElementById(`batida-row-${idx}`).style.background = '#fff8e1';\n  // Show alter section\n  document.getElementById('modal-alterar-label').textContent = `Alterar: ${r.tipo==='entry'?'Entrada':'Saída'} das ${r.hora}`;\n  document.getElementById('modal-horario-novo').value = r.hora.slice(0,5);\n  document.getElementById('modal-alterar-section').style.display = 'block';\n};\n\nwindow._adicionarBatidaSolicitacao = function() {\n  const tipo = document.getElementById('novo-tipo').value;\n  const horario = document.getElementById('novo-horario').value;\n  if (!tipo || !horario) { showToast('Selecione o tipo e o horário.', '#c0392b'); return; }\n  solicitacoesAdicionais.push({ tipo, horario });\n  document.getElementById('novo-tipo').value = '';\n  document.getElementById('novo-horario').value = '';\n\n  // Show pending additions\n  const label = tipo === 'entry' ? 'Entrada' : 'Saída';\n  let pendingEl = document.getElementById('pendentes-adicoes');\n  if (!pendingEl) {\n    pendingEl = document.createElement('div');\n    pendingEl.id = 'pendentes-adicoes';\n    pendingEl.style.cssText = 'margin-top:8px;font-size:12px;color:#2a1f1a;';\n    document.getElementById('modal-adicionar').appendChild(pendingEl);\n  }\n  pendingEl.innerHTML = '<strong>A adicionar:<\u002Fstrong> ' +\n    solicitacoesAdicionais.map(a => `${a.tipo==='entry'?'Entrada':'Saída'} às ${a.horario}`).join(', ');\n};\n\nwindow._fecharModal = function() {\n  document.getElementById('correcao-modal').style.display = 'none';\n  modalDia = null;\n};\n\nwindow._enviarSolicitacao = async function() {\n  const motivo = document.getElementById('modal-motivo').value.trim();\n  const temAlteracao = modalBatidaSelecionada !== null;\n  const temAdicoes = solicitacoesAdicionais.length > 0;\n\n  if (!temAlteracao && !temAdicoes && !motivo) {\n    showToast('Selecione uma batida para alterar, adicione uma nova, ou descreva o motivo.', '#c0392b'); return;\n  }\n\n  const username = Object.keys(USER_MAP).find(k => USER_MAP[k].email === currentUser.email);\n  let descricao = '';\n\n  if (temAlteracao) {\n    const r = modalBatidasDia[modalBatidaSelecionada];\n    const novoHorario = document.getElementById('modal-horario-novo').value;\n    descricao += `Alterar ${r.tipo==='entry'?'Entrada':'Saída'} de ${r.hora} para ${novoHorario || '?'}`;\n  }\n  if (temAdicoes) {\n    const adds = solicitacoesAdicionais.map(a => `Adicionar ${a.tipo==='entry'?'Entrada':'Saída'} às ${a.horario}`).join('; ');\n    descricao += (descricao ? ' | ' : '') + adds;\n  }\n  if (motivo) descricao += ` — Obs: ${motivo}`;\n\n  try {\n    await addDoc(collection(db, 'solicitacoes'), {\n      usuario: username,\n      nome: currentUserData.name,\n      data: modalDia,\n      motivo: descricao,\n      alteracao: temAlteracao ? {\n        horaOriginal: modalBatidasDia[modalBatidaSelecionada].hora,\n        tipo: modalBatidasDia[modalBatidaSelecionada].tipo,\n        horaCorreta: document.getElementById('modal-horario-novo').value\n      } : null,\n      adicoes: solicitacoesAdicionais,\n      status: 'pendente',\n      timestamp: Timestamp.fromDate(new Date())\n    });\n    fecharModal();\n    showToast('Solicitação enviada ao gerente!', '#2a1f1a');\n    buildMonthTabs();\n  } catch(e) {\n    console.error('Erro solicitacao:', e);\n    showToast('Erro ao enviar: ' + (e.code || e.message), '#c0392b');\n  }\n};\n\nasync function loadSolicitacoes() {\n  const container = document.getElementById('mgr-solicitacoes-list');\n  container.innerHTML = '<div class=\"loading\">Carregando...<\u002Fdiv>';\n\n  try {\n    const q = query(\n      collection(db, 'solicitacoes'),\n      where('status', '==', 'pendente')\n    );\n    const snap = await getDocs(q);\n    const items = [];\n    snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));\n    items.sort((a,b) => b.timestamp.seconds - a.timestamp.seconds);\n    window._solicitacoesItems = items;\n\n    if (!items.length) {\n      container.innerHTML = '<div class=\"loading\">Nenhuma solicitação pendente.<\u002Fdiv>';\n      return;\n    }\n\n    container.innerHTML = items.map(s => `\n      <div class=\"solicitacao-card\">\n        <div class=\"sol-header\">\n          <div class=\"avatar\" style=\"width:32px;height:32px;font-size:12px;\">${initials(s.nome)}<\u002Fdiv>\n          <div>\n            <div class=\"sol-nome\">${s.nome}<\u002Fdiv>\n            <div class=\"sol-data\">Dia ${formatDate(s.data)}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"sol-motivo\">💬 ${s.motivo}<\u002Fdiv>\n        <div class=\"sol-btns\">\n          <button class=\"btn-aceitar\" onclick=\"responderSolicitacao('${s.id}', 'aceita')\">✓ Aceitar<\u002Fbutton>\n          <button class=\"btn-recusar\" onclick=\"responderSolicitacao('${s.id}', 'recusada')\">✗ Recusar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  } catch(e) {\n    container.innerHTML = '<div class=\"loading\">Erro ao carregar.<\u002Fdiv>';\n  }\n}\n\nwindow._responderSolicitacao = async function(id, status) {\n  try {\n    // Fetch solicitacao directly from Firestore by id\n    const { getDoc } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\");\n    const solRef = firestoreDoc(db, 'solicitacoes', id);\n    const solSnap = await getDoc(solRef);\n    if (!solSnap.exists()) { showToast('Solicitação não encontrada.', '#c0392b'); return; }\n    const solData = solSnap.data();\n\n    // Update status\n    await updateDoc(solRef, { status, respondidoEm: Timestamp.fromDate(new Date()) });\n\n    if (status === 'aceita') {\n      // Apply alteration to existing punch\n      if (solData.alteracao && solData.alteracao.horaCorreta) {\n        const alt = solData.alteracao;\n        const horaCorreta = alt.horaCorreta.length === 5 ? alt.horaCorreta + ':00' : alt.horaCorreta;\n        const qReg = query(\n          collection(db, 'registros'),\n          where('usuario', '==', solData.usuario),\n          where('data', '==', solData.data),\n          where('tipo', '==', alt.tipo)\n        );\n        const snapReg = await getDocs(qReg);\n        let updated = false;\n        for (const docReg of snapReg.docs) {\n          const d = docReg.data();\n          // Match by original hour (first 5 chars to ignore seconds)\n          if (d.hora && d.hora.slice(0,5) === alt.horaOriginal.slice(0,5)) {\n            await updateDoc(firestoreDoc(db, 'registros', docReg.id), {\n              hora: horaCorreta,\n              corrigido: true,\n              horaOriginal: alt.horaOriginal\n            });\n            updated = true;\n            break;\n          }\n        }\n        if (!updated) console.warn('Registro original não encontrado para alterar');\n      }\n\n      // Apply additions\n      if (solData.adicoes && solData.adicoes.length > 0) {\n        for (const add of solData.adicoes) {\n          const horaAdd = add.horario.length === 5 ? add.horario + ':00' : add.horario;\n          await addDoc(collection(db, 'registros'), {\n            usuario: solData.usuario,\n            nome: solData.nome,\n            data: solData.data,\n            hora: horaAdd,\n            tipo: add.tipo,\n            corrigido: true,\n            timestamp: Timestamp.fromDate(new Date(solData.data + 'T' + add.horario))\n          });\n        }\n      }\n\n      showToast('Ponto corrigido com sucesso!', '#2a1f1a');\n    } else {\n      showToast('Solicitação recusada.', '#c0392b');\n    }\n\n    loadSolicitacoes();\n  } catch(e) {\n    console.error('Erro responder:', e);\n    showToast('Erro: ' + (e.code || e.message), '#c0392b');\n  }\n};\n\n// ---- LISTAS E IPs ----\nasync function renderListaFuncionarios() {\n  const lista = document.getElementById('lista-funcionarios');\n  if (!lista) return;\n  const inicial = [\n    { nome: 'Erllany Nienke', usuario: 'erllany.nienke' },\n    { nome: 'Lucas Luchi', usuario: 'lucas.luchi' },\n    { nome: 'Rafael Ferreira', usuario: 'rafael.ferreira' },\n  ];\n  let extras = [];\n  try {\n    const snap = await getDocs(collection(db, 'funcionarios'));\n    snap.forEach(d => extras.push(d.data()));\n  } catch(e) {}\n  const todos = [...inicial, ...extras];\n  lista.innerHTML = todos.map(f => `\n    <div style=\"display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;\">\n      <div class=\"avatar\" style=\"width:34px;height:34px;font-size:12px;\">${initials(f.nome)}<\u002Fdiv>\n      <div>\n        <div style=\"font-size:14px;font-weight:500;color:#1a1a1a;\">${f.nome}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#888;\">${f.usuario}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\nasync function renderListaIPs() {\n  const lista = document.getElementById('lista-ips');\n  if (!lista) return;\n  const fixos = [\n    { nome: 'Minha Casa', ip: '181.213.70.37', fixo: true },\n    { nome: 'Restaurante', ip: '45.227.123.197', fixo: true },\n    { nome: 'Cherne 1', ip: '162.120.185.214', fixo: true },\n    { nome: 'Cherne 2', ip: '177.206.28.140', fixo: true },\n  ];\n  let extras = [];\n  try {\n    const snap = await getDocs(collection(db, 'ips_autorizados'));\n    snap.forEach(d => extras.push({ id: d.id, ...d.data() }));\n  } catch(e) {}\n  const todos = [...fixos, ...extras];\n  lista.innerHTML = todos.map(r => `\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px;\">\n      <div>\n        <span style=\"font-weight:500;color:#1a1a1a;\">${r.nome}<\u002Fspan>\n        <span style=\"color:#888;margin-left:8px;\">${r.ip}<\u002Fspan>\n      <\u002Fdiv>\n      ${r.fixo ? '<span style=\"font-size:11px;color:#bbb;\">fixo<\u002Fspan>' :\n        `<button onclick=\"removerIP('${r.id}')\" style=\"background:none;border:none;color:#c0392b;cursor:pointer;font-size:20px;line-height:1;padding:0;\">×<\u002Fbutton>`}\n    <\u002Fdiv>\n  `).join('') || '<p style=\"color:#bbb;font-size:13px;\">Nenhuma rede extra<\u002Fp>';\n}\n\nasync function verificarIP() {\n  try {\n    const res = await fetch('https://api.ipify.org?format=json');\n    const data = await res.json();\n    const ipAtual = data.ip;\n    const fixos = ['181.213.70.37', '45.227.123.197', '162.120.185.214', '177.206.28.140'];\n    let extras = [];\n    try {\n      const snap = await getDocs(collection(db, 'ips_autorizados'));\n      snap.forEach(d => extras.push(d.data().ip));\n    } catch(e) {}\n    const todos = [...fixos, ...extras];\n    if (!todos.includes(ipAtual)) {\n      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n      document.getElementById('screen-blocked').classList.add('active');\n      const el = document.getElementById('blocked-ip');\n      if (el) el.textContent = 'Seu IP: ' + ipAtual;\n      return false;\n    }\n    return true;\n  } catch(e) {\n    console.warn('IP check failed, allowing access');\n    return true;\n  }\n}\n\nwindow._adicionarIP = async function() {\n  const nome = document.getElementById('novo-ip-nome').value.trim();\n  const ip = document.getElementById('novo-ip-valor').value.trim();\n  if (!nome || !ip) { showToast('Preencha o nome e o IP.', '#c0392b'); return; }\n  try {\n    await addDoc(collection(db, 'ips_autorizados'), { nome, ip, criadoEm: Timestamp.fromDate(new Date()) });\n    document.getElementById('novo-ip-nome').value = '';\n    document.getElementById('novo-ip-valor').value = '';\n    showToast('Rede autorizada!', '#2a1f1a');\n    renderListaIPs();\n  } catch(e) { showToast('Erro ao adicionar.', '#c0392b'); }\n};\n\nwindow._removerIP = async function(id) {\n  try {\n    const { deleteDoc } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\");\n    await deleteDoc(firestoreDoc(db, 'ips_autorizados', id));\n    showToast('Rede removida.', '#2a1f1a');\n    renderListaIPs();\n  } catch(e) { showToast('Erro ao remover.', '#c0392b'); }\n};\n\n\n// ---- GERENTE: EDIÇÃO DIRETA DE PONTOS ----\nlet mgrPunchData = null; // { usuario, nome, data, registros[] }\nlet mgrPunchSelecionado = null; // index of selected punch\n\nwindow._abrirMgrPunchModal = async function(usuario, nome, data) {\n  mgrPunchData = { usuario, nome, data, registros: [] };\n  mgrPunchSelecionado = null;\n  document.getElementById('mgr-punch-titulo').textContent = `Editar ponto — ${nome}`;\n  document.getElementById('mgr-punch-info').textContent = `Dia: ${formatDate(data)}`;\n  document.getElementById('mgr-punch-alterar').style.display = 'none';\n  document.getElementById('mgr-novo-tipo').value = '';\n  document.getElementById('mgr-novo-horario').value = '';\n  document.getElementById('mgr-punch-modal').style.display = 'flex';\n\n  // Load registros\n  const q = query(collection(db, 'registros'), where('usuario', '==', usuario), where('data', '==', data));\n  const snap = await getDocs(q);\n  mgrPunchData.registros = [];\n  snap.forEach(d => mgrPunchData.registros.push({ id: d.id, ...d.data() }));\n  mgrPunchData.registros.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n  renderMgrPunchBatidas();\n};\n\nfunction renderMgrPunchBatidas() {\n  const el = document.getElementById('mgr-punch-batidas');\n  if (!mgrPunchData.registros.length) {\n    el.innerHTML = '<span style=\"color:#bbb;font-size:13px;\">Nenhuma batida — use o botão + para adicionar<\u002Fspan>';\n    return;\n  }\n  el.innerHTML = mgrPunchData.registros.map((r, i) => `\n    <div onclick=\"selecionarMgrPunch(${i})\" id=\"mgr-punch-row-${i}\"\n      style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 6px;border-bottom:1px solid #eee;cursor:pointer;border-radius:6px;\">\n      <span class=\"${r.tipo==='entry'?'badge-type-in':'badge-type-out'}\" style=\"font-weight:600;\">${r.tipo==='entry'?'▶ Entrada':'■ Saída'}<\u002Fspan>\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <span style=\"color:#444;\">${r.hora}<\u002Fspan>\n        <span style=\"font-size:11px;color:#F07820;\">✎<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\nwindow.selecionarMgrPunch = function(idx) {\n  mgrPunchSelecionado = idx;\n  const r = mgrPunchData.registros[idx];\n  document.querySelectorAll('[id^=\"mgr-punch-row-\"]').forEach(el => el.style.background = '');\n  document.getElementById(`mgr-punch-row-${idx}`).style.background = '#fff8e1';\n  document.getElementById('mgr-punch-alterar-label').textContent = `Alterar ${r.tipo==='entry'?'Entrada':'Saída'} das ${r.hora}:`;\n  document.getElementById('mgr-punch-novo-horario').value = r.hora.slice(0,5);\n  document.getElementById('mgr-punch-alterar').style.display = 'block';\n};\n\nwindow.aplicarAlteracaoMgr = async function() {\n  if (mgrPunchSelecionado === null) return;\n  const novoHorario = document.getElementById('mgr-punch-novo-horario').value;\n  if (!novoHorario) { showToast('Selecione o novo horário.', '#c0392b'); return; }\n\n  const reg = mgrPunchData.registros[mgrPunchSelecionado];\n  try {\n    await updateDoc(firestoreDoc(db, 'registros', reg.id), {\n      hora: novoHorario + ':00',\n      corrigido: true,\n      horaOriginal: reg.hora\n    });\n    showToast('Horário alterado!', '#2a1f1a');\n    // Refresh\n    const q = query(collection(db, 'registros'), where('usuario', '==', mgrPunchData.usuario), where('data', '==', mgrPunchData.data));\n    const snap = await getDocs(q);\n    mgrPunchData.registros = [];\n    snap.forEach(d => mgrPunchData.registros.push({ id: d.id, ...d.data() }));\n    mgrPunchData.registros.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n    mgrPunchSelecionado = null;\n    document.getElementById('mgr-punch-alterar').style.display = 'none';\n    renderMgrPunchBatidas();\n    loadReport(); // refresh report\n  } catch(e) {\n    showToast('Erro ao alterar: ' + (e.code || e.message), '#c0392b');\n  }\n};\n\nwindow.adicionarPontoMgr = async function() {\n  const tipo = document.getElementById('mgr-novo-tipo').value;\n  const horario = document.getElementById('mgr-novo-horario').value;\n  if (!tipo || !horario) { showToast('Selecione tipo e horário.', '#c0392b'); return; }\n\n  try {\n    await addDoc(collection(db, 'registros'), {\n      usuario: mgrPunchData.usuario,\n      nome: mgrPunchData.nome,\n      data: mgrPunchData.data,\n      hora: horario + ':00',\n      tipo: tipo,\n      corrigido: true,\n      timestamp: Timestamp.fromDate(new Date(mgrPunchData.data + 'T' + horario))\n    });\n    showToast(`${tipo==='entry'?'Entrada':'Saída'} adicionada!`, '#2a1f1a');\n    document.getElementById('mgr-novo-tipo').value = '';\n    document.getElementById('mgr-novo-horario').value = '';\n    // Refresh\n    const q = query(collection(db, 'registros'), where('usuario', '==', mgrPunchData.usuario), where('data', '==', mgrPunchData.data));\n    const snap = await getDocs(q);\n    mgrPunchData.registros = [];\n    snap.forEach(d => mgrPunchData.registros.push({ id: d.id, ...d.data() }));\n    mgrPunchData.registros.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds);\n    renderMgrPunchBatidas();\n    loadReport();\n  } catch(e) {\n    showToast('Erro: ' + (e.code || e.message), '#c0392b');\n  }\n};\n\nwindow.fecharMgrPunchModal = function() {\n  document.getElementById('mgr-punch-modal').style.display = 'none';\n  mgrPunchData = null;\n  mgrPunchSelecionado = null;\n};\n\n\n// ---- CADASTRO FUNCTIONS ----\nlet cadastroAtualId = null;\nlet cadastroEditId = null;\n\nasync function loadCadastros() {\n  const lista = document.getElementById('cadastro-lista');\n  if (!lista) return;\n  lista.innerHTML = '<div class=\"loading\">Carregando...<\u002Fdiv>';\n  try {\n    const snap = await getDocs(collection(db, 'cadastros'));\n    const items = [];\n    snap.forEach(d => items.push({ id: d.id, ...d.data() }));\n\n    if (!items.length) {\n      lista.innerHTML = '<p style=\"color:#bbb;font-size:13px;text-align:center;padding:2rem 0;\">Nenhum colaborador cadastrado ainda.<br>Clique em + Novo para adicionar.<\u002Fp>';\n      return;\n    }\n\n    lista.innerHTML = items.map(f => `\n      <div onclick=\"verPerfilCadastro('${f.id}')\" class=\"emp-card\" style=\"cursor:pointer;margin-bottom:10px;\">\n        <div class=\"emp-card-header\">\n          <div class=\"avatar\" style=\"width:40px;height:40px;font-size:14px;\">${initials(f.nome)}<\u002Fdiv>\n          <div style=\"flex:1;\">\n            <div class=\"emp-card-name\">${f.nome}<\u002Fdiv>\n            <div class=\"emp-card-status\" style=\"color:#888;\">${f.funcao || '—'} ${f.admissao ? '· ' + f.admissao : ''}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"color:#F07820;font-size:20px;\">›<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  } catch(e) {\n    lista.innerHTML = '<div class=\"loading\">Erro ao carregar.<\u002Fdiv>';\n    console.error('loadCadastros error:', e);\n  }\n}\n\nfunction showCadastroView(view) {\n  ['lista','perfil','form'].forEach(v => {\n    const el = document.getElementById(`cadastro-view-${v}`);\n    if (el) el.style.display = v === view ? 'block' : 'none';\n  });\n}\n\nwindow._mostrarFormCadastro = function(editId) {\n  cadastroEditId = editId || null;\n  document.getElementById('form-cad-titulo').textContent = editId ? 'Editar colaborador' : 'Novo colaborador';\n  if (!editId) {\n    ['cad-nome','cad-usuario','cad-codigo','cad-matricula','cad-funcao','cad-admissao','cad-ctps','cad-cpf'].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.value = '';\n    });\n  }\n  showCadastroView('form');\n};\n\nwindow._voltarListaCadastro = function() {\n  cadastroEditId = null;\n  cadastroAtualId = null;\n  showCadastroView('lista');\n  loadCadastros();\n};\n\nwindow._verPerfilCadastro = async function(id) {\n  cadastroAtualId = id;\n  try {\n    const { getDoc } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\");\n    const snap = await getDoc(firestoreDoc(db, 'cadastros', id));\n    if (!snap.exists()) return;\n    const f = snap.data();\n    document.getElementById('perfil-cad-titulo').textContent = f.nome;\n    document.getElementById('perfil-cad-dados').innerHTML = `\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n        ${[['Nome',f.nome],['Usuário',f.usuario],['Código',f.codigo],['Matrícula',f.matricula],\n           ['Função',f.funcao],['Admissão',f.admissao],['CTPS/Série/UF',f.ctps],['CPF',f.cpf]]\n          .map(([label,val]) => val ? `<div><div style=\"font-size:11px;color:#888;margin-bottom:3px;\">${label}<\u002Fdiv><div style=\"font-size:14px;font-weight:500;color:#1a1a1a;\">${val}<\u002Fdiv><\u002Fdiv>` : '')\n          .join('')}\n      <\u002Fdiv>`;\n    showCadastroView('perfil');\n  } catch(e) { showToast('Erro ao carregar.', '#c0392b'); }\n};\n\nwindow._editarCadastroAtual = async function() {\n  if (!cadastroAtualId) return;\n  try {\n    const { getDoc } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\");\n    const snap = await getDoc(firestoreDoc(db, 'cadastros', cadastroAtualId));\n    const f = snap.data();\n    document.getElementById('cad-nome').value = f.nome || '';\n    document.getElementById('cad-usuario').value = f.usuario || '';\n    document.getElementById('cad-codigo').value = f.codigo || '';\n    document.getElementById('cad-matricula').value = f.matricula || '';\n    document.getElementById('cad-funcao').value = f.funcao || '';\n    document.getElementById('cad-admissao').value = f.admissao || '';\n    document.getElementById('cad-ctps').value = f.ctps || '';\n    document.getElementById('cad-cpf').value = f.cpf || '';\n    cadastroEditId = cadastroAtualId;\n    document.getElementById('form-cad-titulo').textContent = 'Editar colaborador';\n    showCadastroView('form');\n  } catch(e) { showToast('Erro ao carregar dados.', '#c0392b'); }\n};\n\nwindow._gerarFolhaPDF = async function(id) {\n  showToast('Gerando folha de ponto...', '#2a1f1a');\n  try {\n    const { getDoc } = await import(\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js\");\n    const snap = await getDoc(firestoreDoc(db, 'cadastros', id));\n    if (!snap.exists()) { showToast('Cadastro não encontrado.', '#c0392b'); return; }\n    const func = snap.data();\n\n    const mesInput = prompt('Mês (1-12):', new Date().getMonth() + 1);\n    const anoInput = prompt('Ano:', new Date().getFullYear());\n    if (!mesInput || !anoInput) return;\n\n    const mesNum = parseInt(mesInput);\n    const anoNum = parseInt(anoInput);\n    const firstDay = `${anoNum}-${String(mesNum).padStart(2,'0')}-01`;\n    const lastDayNum = new Date(anoNum, mesNum, 0).getDate();\n    const lastDay = `${anoNum}-${String(mesNum).padStart(2,'0')}-${String(lastDayNum).padStart(2,'0')}`;\n\n    const q = query(\n      collection(db, 'registros'),\n      where('usuario', '==', func.usuario),\n      where('data', '>=', firstDay),\n      where('data', '<=', lastDay)\n    );\n    const recSnap = await getDocs(q);\n    const registros = {};\n    recSnap.forEach(d => {\n      const r = d.data();\n      if (!registros[r.data]) registros[r.data] = [];\n      registros[r.data].push(r);\n    });\n    Object.values(registros).forEach(arr => arr.sort((a,b) => a.timestamp.seconds - b.timestamp.seconds));\n\n    _gerarHTMLFolha(func, anoNum, mesNum, lastDayNum, registros);\n  } catch(e) {\n    console.error('gerarFolhaPDF error:', e);\n    showToast('Erro: ' + (e.code || e.message), '#c0392b');\n  }\n};\n\nfunction _gerarHTMLFolha(func, ano, mes, totalDias, registros) {\n  const diasSemana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];\n  const mesesNomes = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];\n  const EMPRESA = { nome: 'Caetano Representações LTDA', cnpj: '16.731.920/0001-10', codigo: '329', filial: '1' };\n\n  let totalNormalSec = 0, totalNoturnoSec = 0;\n  let rows = '';\n\n  for (let d = 1; d <= totalDias; d++) {\n    const dataStr = `${ano}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;\n    const diaSem = new Date(dataStr + 'T12:00:00').getDay();\n    const dataFmt = `${String(d).padStart(2,'0')}/${String(mes).padStart(2,'0')}/${ano}`;\n    const recs = registros[dataStr] || [];\n    const isDomingo = diaSem === 0;\n\n    let marcacoesHTML = '';\n    let horasCell = '';\n\n    if (isDomingo) {\n      marcacoesHTML = '<td colspan=\"2\" style=\"text-align:center;color:#888;font-style:italic;border:1px solid #ccc;padding:3px 6px;font-size:11px;\">- - - DOMINGO - - -<\u002Ftd>';\n    } else if (!recs.length) {\n      marcacoesHTML = '<td style=\"border:1px solid #ccc;padding:3px 6px;\"><\u002Ftd><td style=\"border:1px solid #ccc;padding:3px 6px;\"><\u002Ftd>';\n    } else {\n      const entradas = recs.filter(r => r.tipo==='entry').map(r => r.hora.slice(0,5)).join('  ');\n      const saidas = recs.filter(r => r.tipo==='exit').map(r => r.hora.slice(0,5)).join('  ');\n      const det = calcDetalhado(recs);\n      totalNormalSec += det.normal;\n      totalNoturnoSec += det.noturno;\n      const totalStr = secsToStr(det.total) || '';\n      const noturnoStr = secsToStr(det.noturno) || '';\n      marcacoesHTML = `<td style=\"border:1px solid #ccc;padding:3px 8px;font-family:monospace;font-size:11px;\">${entradas}<\u002Ftd><td style=\"border:1px solid #ccc;padding:3px 8px;font-family:monospace;font-size:11px;\">${saidas}<\u002Ftd>`;\n      horasCell = noturnoStr ? `${totalStr}<br><small style=\"color:#e65100;\">${noturnoStr} not.<\u002Fsmall>` : totalStr;\n    }\n\n    rows += `<tr>\n      <td style=\"border:1px solid #ccc;padding:3px 6px;font-size:11px;white-space:nowrap;\">${dataFmt}<br><span style=\"font-size:9px;color:#666;\">${diasSemana[diaSem].slice(0,3)}<\u002Fspan><\u002Ftd>\n      ${marcacoesHTML}\n      <td style=\"border:1px solid #ccc;padding:3px 6px;font-size:11px;text-align:center;\">${horasCell}<\u002Ftd>\n      <td style=\"border:1px solid #ccc;padding:3px 6px;width:120px;\"><\u002Ftd>\n    <\u002Ftr>`;\n  }\n\n  const totalNormal = secsToStr(totalNormalSec) || '00h00min';\n  const totalNoturno = secsToStr(totalNoturnoSec) || '00h00min';\n  const totalGeral = secsToStr(totalNormalSec + totalNoturnoSec) || '00h00min';\n\n  const html = `<!DOCTYPE html><html><head><meta charset=\"UTF-8\">\n<title>Folha de Ponto - ${func.nome} - ${mesesNomes[mes]}/${ano}<\u002Ftitle>\n<style>\n* { margin:0; padding:0; box-sizing:border-box; }\nbody { font-family:Arial,sans-serif; font-size:12px; padding:15px; }\nh2 { text-align:center; font-size:14px; margin-bottom:3px; }\nh3 { text-align:center; font-size:11px; font-weight:normal; margin-bottom:8px; }\ntable { width:100%; border-collapse:collapse; margin-top:8px; }\nth { background:#f0f0f0; border:1px solid #ccc; padding:4px 6px; font-size:11px; text-align:center; }\n.totais { margin-top:14px; border:1px solid #ccc; padding:10px; }\n.totais-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center; }\n.total-item { border:1px solid #ddd; padding:8px; border-radius:4px; }\n.total-label { font-size:10px; color:#666; margin-bottom:4px; }\n.total-value { font-size:16px; font-weight:bold; }\n.assinatura { margin-top:40px; display:flex; justify-content:space-between; }\n.assinatura-linha { border-top:1px solid #000; width:45%; text-align:center; padding-top:4px; font-size:10px; }\n@media print { body { padding:5px; } }\n<\u002Fstyle><\u002Fhead><body>\n<h2>${EMPRESA.nome}<\u002Fh2>\n<h3>Folha Individual de Presença — ${mesesNomes[mes]} ${ano}<\u002Fh3>\n<div style=\"font-size:11px;margin-bottom:4px;\">\n  <span>Código Empresa: ${EMPRESA.codigo} - Filial: ${EMPRESA.filial}<\u002Fspan>\n  <span style=\"margin-left:16px;\">CNPJ/CPF: ${EMPRESA.cnpj}<\u002Fspan>\n<\u002Fdiv>\n<div style=\"font-size:11px;margin-bottom:2px;\">\n  <span>Código: ${func.codigo||''}<\u002Fspan>\n  <span style=\"margin-left:12px;\">Nome: <strong>${func.nome}<\u002Fstrong><\u002Fspan>\n  <span style=\"margin-left:12px;\">Função: ${func.funcao||''}<\u002Fspan>\n  <span style=\"margin-left:12px;\">Dt Admissão: ${func.admissao||''}<\u002Fspan>\n<\u002Fdiv>\n<div style=\"font-size:11px;margin-bottom:8px;\">\n  <span>CTPS/Série/UF: ${func.ctps||''}<\u002Fspan>\n  <span style=\"margin-left:12px;\">CPF: ${func.cpf||''}<\u002Fspan>\n  <span style=\"margin-left:12px;\">Matrícula: ${func.matricula||''}<\u002Fspan>\n<\u002Fdiv>\n<table>\n  <thead>\n    <tr>\n      <th rowspan=\"2\" style=\"width:70px;\">Data<\u002Fth>\n      <th colspan=\"2\">Marcações<\u002Fth>\n      <th rowspan=\"2\" style=\"width:80px;\">Horas Trabalhadas<\u002Fth>\n      <th rowspan=\"2\" style=\"width:120px;\">Assinatura<\u002Fth>\n    <\u002Ftr>\n    <tr><th>Entrada(s)<\u002Fth><th>Saída(s)<\u002Fth><\u002Ftr>\n  <\u002Fthead>\n  <tbody>${rows}<\u002Ftbody>\n<\u002Ftable>\n<div class=\"totais\">\n  <div class=\"totais-grid\">\n    <div class=\"total-item\">\n      <div class=\"total-label\">Horas Diurnas<\u002Fdiv>\n      <div class=\"total-value\">${totalNormal}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"total-item\" style=\"border-color:#e65100;\">\n      <div class=\"total-label\">Horas Noturnas (22h-05h)<\u002Fdiv>\n      <div class=\"total-value\" style=\"color:#e65100;\">${totalNoturno}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"total-item\" style=\"background:#f5f5f5;\">\n      <div class=\"total-label\">Total Geral<\u002Fdiv>\n      <div class=\"total-value\">${totalGeral}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"assinatura\">\n  <div class=\"assinatura-linha\">Assinatura do Empregado<\u002Fdiv>\n  <div class=\"assinatura-linha\">Assinatura do Empregador<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fbody><\u002Fhtml>`;\n\n  const win = window.open('', '_blank');\n  if (!win) { showToast('Permita pop-ups para gerar o PDF.', '#c0392b'); return; }\n  win.document.write(html);\n  win.document.close();\n  setTimeout(() => win.print(), 800);\n}\n\nwindow._gerarFolhaPDFAtual = function() {\n  if (cadastroAtualId) window._gerarFolhaPDF(cadastroAtualId);\n};\n\nwindow._salvarCadastro = async function() {\n  const nome = document.getElementById('cad-nome').value.trim();\n  const usuario = document.getElementById('cad-usuario').value.trim();\n  const errEl = document.getElementById('cad-error');\n  if (!nome || !usuario) {\n    errEl.textContent = 'Nome e usuário são obrigatórios.';\n    return;\n  }\n  errEl.textContent = '';\n\n  const dados = {\n    nome,\n    usuario: usuario.toLowerCase(),\n    codigo: document.getElementById('cad-codigo').value.trim(),\n    matricula: document.getElementById('cad-matricula').value.trim(),\n    funcao: document.getElementById('cad-funcao').value.trim(),\n    admissao: document.getElementById('cad-admissao').value.trim(),\n    ctps: document.getElementById('cad-ctps').value.trim(),\n    cpf: document.getElementById('cad-cpf').value.trim(),\n    atualizadoEm: Timestamp.fromDate(new Date())\n  };\n\n  try {\n    if (cadastroEditId) {\n      await updateDoc(firestoreDoc(db, 'cadastros', cadastroEditId), dados);\n      showToast('Cadastro atualizado!', '#2a1f1a');\n      cadastroEditId = null;\n    } else {\n      await addDoc(collection(db, 'cadastros'), dados);\n      showToast('Colaborador cadastrado!', '#2a1f1a');\n    }\n    ['cad-nome','cad-usuario','cad-codigo','cad-matricula','cad-funcao','cad-admissao','cad-ctps','cad-cpf'].forEach(id => {\n      const el = document.getElementById(id);\n      if (el) el.value = '';\n    });\n    await loadCadastros();\n    showCadastroView('lista');\n    cadastroEditId = null;\n  } catch(e) {\n    console.error('salvarCadastro error:', e);\n    errEl.textContent = 'Erro ao salvar: ' + (e.code || e.message);\n  }\n};\n\n\nwindow._togglePass = function() {\n  const inp = document.getElementById('login-pass');\n  const btn = document.getElementById('btn-show-pass');\n  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }\n  else { inp.type = 'password'; btn.textContent = '👁'; }\n};\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
